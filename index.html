<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaVertec</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 40px 20px;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 0px;
    }

    h1 {
      font-size: 60px;
      margin: 0 0 20px 0;
    }

    img {
      width: 400px; /* Bildgröße hier anpassen */
      max-width: 90%;
      margin-bottom: 40px;
    }

    .text {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.9;
      color: #d1d5db;
      font-style: italic;
    }

    .headline {
      margin-top: 0px;
      font-weight: bold;
      color: white;
      font-size: 24px;
    }

    .highlight {
      margin-top: 40px;
      font-size: 24px;
      color: white;
      font-weight: bold;
    }

    .footer {
      margin-top: 40px;
      font-size: 18px;
      color: #94a3b8;
      font-style: italic;
    }
  </style>
</head>

<body>

  <div class="container">

<div class="icon">
  <svg xmlns="http://www.w3.org/2000/svg"
       width="80"
       height="80"
       viewBox="0 0 24 24"
       fill="none"
       stroke="white"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round">

    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
    <path d="M15 8h.01" />
    <path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12" />
    <path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" />
    <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" />

  </svg>
</div>

    <h1>DaVertec</h1>

    <img src="logo.png" alt="DaVertec Logo">

    <div class="headline">
        Once it's done ...
    </div>

    <div class="text">
      ... you will take a look at it.<br>
      ... you will use it.<br>
      ... you will be impressed.<br>
      ... you will love it.<br>
      ... you will never want to be without it.
    </div>

    <div class="highlight">
      Something BIG is coming.<br>
      Keep updated.
    </div>

    <div class="footer">
      Website is coming soon ...
    </div>

  </div>

</body>
</html>
